<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CD Player</title>

<!-- CSS -->
<link rel="stylesheet" href="https://raw.githubusercontent.com/DoggyGamesShow123/cd/refs/heads/main/css/style.css">

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<!-- UTILITIES -->
<script src="https://raw.githubusercontent.com/DoggyGamesShow123/cd/refs/heads/main/js/utils.js"></script>

<!-- AUDIO ENGINE -->
<script src="https://raw.githubusercontent.com/DoggyGamesShow123/cd/refs/heads/main/js/engine.js"></script>

<!-- TURNTABLE PHYSICS -->
<script src="https://raw.githubusercontent.com/DoggyGamesShow123/cd/refs/heads/main/js/turnable.js"></script>

<!-- SCRATCH ENGINE -->
<script src="https://raw.githubusercontent.com/DoggyGamesShow123/cd/refs/heads/main/js/scrub.js"></script>

<!-- PITCH CONTROL -->
<script src="https://raw.githubusercontent.com/DoggyGamesShow123/cd/refs/heads/main/js/pitch.js"></script>

<!-- INIT -->
<script src="https://raw.githubusercontent.com/DoggyGamesShow123/cd/refs/heads/main/js/turntableAppInit.js"></script>

</head>
<body>

<div id="ui">
    <input type="file" id="fileInput" accept=".mp3,.zip">

    <div id="controls">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
    </div>

    <div id="pitchBox">
        <label>Pitch</label>
        <input id="pitchSlider" type="range" min="-50" max="50" value="0">
        <span id="pitchValue">0%</span>
    </div>

    <div id="timeDisplay">00:00 / 00:00</div>
</div>

<div id="turntable">
    <div id="cd">
        <div id="cd-top"></div>
        <div id="cd-bottom"
             style="background-image:url('https://raw.githubusercontent.com/DoggyGamesShow123/cd/refs/heads/main/images/cd_bottom.png');">
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    initTurntableApp();
});
</script>

</body>
</html>
``
