<!DOCTYPE html>
<html>
<head>
<title>Download EmulatorJS Data</title>
<style>
  body {
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding-top:50px;
  }
  button {
    padding:15px 25px;
    font-size:20px;
    background:#28a4ff;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
  }
  button:hover { background:#1f7fcc; }
</style>
</head>
<body>

<h1>Download EmulatorJS Data</h1>
<p>This will instantly download the full EmulatorJS data package.</p>

<button onclick="downloadData()">Download Now</button>

<script>
function downloadData() {
  const url = "https://cdn.emulatorjs.org/stable/data/emulator.min.zip";
  const a = document.createElement("a");
  a.href = url;
  a.download = "emulator-data.zip"; // rename locally
  document.body.appendChild(a);
  a.click();
  a.remove();
}
</script>

</body>
</html>
